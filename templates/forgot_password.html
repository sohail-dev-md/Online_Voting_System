{% extends "nav.html" %}

{% block title %}
    Forgot Password
{% endblock %}

{% block main %}
    <div class="box">
        <div class="container">
            <div class="form">
                <h1>Forgot Password</h1>
                <form action="/forgot_password" method="post">
                    <div class="inputbox">
                        <input type="email" title="Email" id="Email" name="email" autocomplete="off" required>
                        <label for="Email" class="form-label">Email</label>
                    </div>

                    <div class="inputbox">
                        <input type="submit" value="Submit">
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
